services:
  postgres:
    image: postgres

    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres

  redis:
    image: redis
    environment:
      REDIS_PASSWORD: 1234
      REDIS_HOST: localhost
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
